services:
  redis:
    image: redis:7-alpine
    container_name: trmnl-nightsky-redis
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: trmnl-nightsky-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - data:/data
    depends_on:
      - redis

volumes:
  data:
  redis_data:

# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1745280000
    plugin_settings:
      instance_name: "Night Sky"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "no"
      custom_fields_values:
        location: "London, UK"
  sky:
    bortle: 4
    bortle_label: "Rural/suburban"
    nelm: 6.3
    stars: 3200
    stars_formatted: "3k+"
  sun:
    rises: "06:12"
    sets: "21:05"
  moon:
    phase: "Waxing Crescent"
    illumination: 26
    sets: "00:43"
    rises: "07:49"
    days:
      - { label: "Tonight",  date: "21 Apr", phase: "Waxing Crescent", illumination: 26, waxing: true }
      - { label: "Tomorrow", date: "22 Apr", phase: "Waxing Crescent", illumination: 36, waxing: true }
      - { label: "Thu",      date: "23 Apr", phase: "First Quarter",   illumination: 50, waxing: true }
      - { label: "Fri",      date: "24 Apr", phase: "Waxing Gibbous",  illumination: 63, waxing: true }
  forecast:
    now:
      cloud: 15
      cloud_low: 5
      cloud_mid: 8
      cloud_high: 10
      next6h_avg: 22
      temp: 11
      dew_point: 7
      humidity: 74
      wind_speed: 12
      wind_dir: "W"
    hourly:
      - { hour: "21", cloud: 15, cloud_low: 5,  cloud_mid: 8,  cloud_high: 10, seeing: 2, transparency: 2 }
      - { hour: "22", cloud: 22, cloud_low: 8,  cloud_mid: 10, cloud_high: 12, seeing: 2, transparency: 3 }
      - { hour: "23", cloud: 40, cloud_low: 15, cloud_mid: 20, cloud_high: 18, seeing: 3, transparency: 3 }
      - { hour: "00", cloud: 55, cloud_low: 20, cloud_mid: 28, cloud_high: 22, seeing: 4, transparency: 4 }
      - { hour: "01", cloud: 35, cloud_low: 10, cloud_mid: 18, cloud_high: 15, seeing: 3, transparency: 3 }
      - { hour: "02", cloud: 20, cloud_low: 5,  cloud_mid: 10, cloud_high: 12, seeing: 2, transparency: 2 }
      - { hour: "03", cloud: 10, cloud_low: 2,  cloud_mid: 5,  cloud_high: 8,  seeing: 2, transparency: 2 }
      - { hour: "04", cloud: 8,  cloud_low: 2,  cloud_mid: 3,  cloud_high: 5,  seeing: 1, transparency: 1 }
  planets:
    - name: "Jupiter"
      dir: "SW"
      alt: 42
      mag: -2.3
      size: 40.1
      constellation: "Taurus"
    - name: "Saturn"
      dir: "E"
      alt: 28
      mag: 0.5
      size: 17.2
      constellation: "Aquarius"
    - name: "Mars"
      dir: "S"
      alt: 35
      mag: -0.2
      size: 8.5
      constellation: "Gemini"
    - name: "Uranus"
      dir: "SE"
      alt: 18
      mag: 5.8
      size: 3.7
      constellation: "Aries"
  viewing:
    verdict: "Good"
    stars_text: "★★★"
    score: 7
    best_from: "23:30"
    date: "22 Apr 2026"

# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields: {}

variables:
  trmnl:
    system:
      timestamp_utc: 1745280000
    plugin_settings:
      instance_name: "Night Sky"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "no"
      custom_fields_values:
        location: "London, UK"
  sky:
    bortle: 4
    bortle_label: "Rural/suburban"
    nelm: 6.3
    stars: 3200
    stars_formatted: "3k+"
  sun:
    rises: "06:12"
    sets: "21:05"
  moon:
    phase: "Waxing Gibbous"
    illumination: 62
    sets: "23:14"
    rises: "15:45"
  clouds:
    now: 15
    next6h_avg: 22
    hourly: [15, 20, 35, 50, 40, 28, 15, 10]
  planets:
    - name: "Jupiter"
      dir: "SW"
      alt: 42
      mag: -2.3
      size: 40.1
      constellation: "Taurus"
    - name: "Saturn"
      dir: "E"
      alt: 28
      mag: 0.5
      size: 17.2
      constellation: "Aquarius"
    - name: "Mars"
      dir: "S"
      alt: 35
      mag: -0.2
      size: 8.5
      constellation: "Gemini"
    - name: "Uranus"
      dir: "SE"
      alt: 18
      mag: 5.8
      size: 3.7
      constellation: "Aries"
  viewing:
    verdict: "Good"
    stars_text: "★★★"
    score: 7
    best_from: "23:30"
    date: "22 Apr 2026"

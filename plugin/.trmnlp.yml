# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
watch:
  - .trmnlp.yml
  - src

custom_fields:
  show_info_panel:
    label: "Show info panel"
    type: boolean
    default: true

variables:
  trmnl:
    system:
      timestamp_utc: 1745280000
    plugin_settings:
      instance_name: "Night Sky"
      strategy: polling
      dark_mode: "no"
      no_screen_padding: "no"
      custom_fields_values:
        location: "London, UK"
        constellations: "names"
        show_title_bar: "true"
        hide_during_day: "false"
        show_planet_names: "true"
        show_info_panel: "true"
  data:
    sky:
      bortle: 4
      bortle_label: "Rural/suburban"
      nelm: 6.3
      is_day: true
      chart: ""
      chart_w: 800
      chart_h: 480
    sun:
      rises: "06:12"
      sets: "21:05"
      alt: 35
      az: 165
    moon:
      phase: "Waxing Crescent"
      illumination: 26
      sets: "00:43"
      rises: "07:49"
      days:
        - { label: "Tonight",  phase: "Waxing Crescent", illumination: 26, waxing: true }
        - { label: "Tomorrow", phase: "Waxing Crescent", illumination: 36, waxing: true }
        - { label: "Thu",      phase: "First Quarter",   illumination: 50, waxing: true }
        - { label: "Fri",      phase: "Waxing Gibbous",  illumination: 63, waxing: true }
    forecast:
      now:
        cloud: 15
        cloud_low: 5
        cloud_mid: 8
        cloud_high: 10
        temp: 11
        dew_point: 7
        humidity: 74
        wind_speed: 12
        wind_dir: "W"
    planets:
      - name: "Jupiter"
        dir: "SW"
        az: 225
        alt: 42
        mag: -2.3
        constellation: "Taurus"
      - name: "Saturn"
        dir: "E"
        az: 90
        alt: 28
        mag: 0.5
        constellation: "Aquarius"
      - name: "Mars"
        dir: "S"
        az: 180
        alt: 35
        mag: -0.2
        constellation: "Gemini"
      - name: "Uranus"
        dir: "SE"
        az: 135
        alt: 18
        mag: 5.8
        constellation: "Aries"
    constellations:
      - n: "Orion"
        ls:
          - [100.0, 20.0, 105.0, 25.0]
          - [105.0, 25.0, 110.0, 30.0]
          - [110.0, 30.0, 115.0, 28.0]
        laz: 107.0
        lalt: 26.0
      - n: "Gemini"
        ls:
          - [175.0, 32.0, 180.0, 38.0]
          - [180.0, 38.0, 185.0, 35.0]
        laz: 180.0
        lalt: 35.0
      - n: "Taurus"
        ls:
          - [215.0, 38.0, 222.0, 44.0]
          - [222.0, 44.0, 228.0, 40.0]
        laz: 222.0
        lalt: 41.0
    viewing:
      verdict: "Good"
      best_from: "23:30"
      date: "22 Apr 2026"

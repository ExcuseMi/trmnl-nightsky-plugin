---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 2.3.7
serverless_language: ''
polling_url: https://trmnl.bettens.dev/nightsky/data?location={{ location | url_encode }}&tz={{ trmnl.user.time_zone_iana }}&w={{ trmnl.device.width }}&h={{ trmnl.device.height }}&constellations={{ constellations }}
polling_headers: ''
polling_body: ''
id: 290823
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: "A real-time star chart for your location with an optional conditions overlay. The chart renders the sky as it looks right now — stars sized by magnitude, moon position, and visible planets. The overlay shows Bortle scale, naked-eye limiting magnitude, moon phase &amp; illumination, cloud cover forecast, temperature, and a best-viewing window estimate.<br /><br /><a href=\"https://github.com/ExcuseMi/trmnl-nightsky-plugin/blob/main/GUIDE.md\">\U0001F4D6 Plugin Guide</a><br /><br /><strong>Data sources:</strong> <a href=\"https://aa.usno.navy.mil/data/api\">USNO Astronomical API</a> · <a href=\"https://open-meteo.com\">Open-Meteo</a> · <a href=\"https://www.lightpollutionmap.info\">lightpollutionmap.info</a> (VIIRS 2024)"
  github_url: https://github.com/ExcuseMi/trmnl-nightsky-plugin
  category: nature
- keyname: location
  field_type: string
  name: Location
  description: City or address to centre the sky report on.<br /><strong>Examples:</strong> London, UK · Central Park, New York · Sydney, Australia
  placeholder: London, UK
- keyname: constellations
  field_type: select
  name: Constellations
  description: Draw constellation stick figures on the star chart.
  options:
  - Show with names: names
  - Show lines only: lines
  - Hide: hide
  optional: true
  default: hide
- keyname: show_info_panel
  field_type: boolean
  name: Show Info Panel
  description: Show the conditions overlay on top of the star chart.
name: Night Sky
refresh_interval: 1440

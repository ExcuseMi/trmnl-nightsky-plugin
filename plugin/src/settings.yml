---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 2.3.7
serverless_language: 
polling_url: https://trmnl.bettens.dev/nightsky/data?location={{ location | url_encode }}&tz=###{{ trmnl.user.time_zone_iana }}&w=###{{ trmnl.device.width }}&h=###{{ trmnl.device.height }}
polling_headers: ''
polling_body: ''
id: 290823
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Tonight's sky conditions for your location — Bortle scale, stars visible, moon phase, visible planets, and cloud cover.<br /><br /><a href="https://github.com/ExcuseMi/trmnl-nightsky-plugin/blob/main/GUIDE.md">📖 Plugin Guide</a><br /><br /><strong>Data sources:</strong> <a href="https://aa.usno.navy.mil/data/api">USNO Astronomical API</a> · <a href="https://open-meteo.com">Open-Meteo</a> · <a href="https://www.lightpollutionmap.info">lightpollutionmap.info</a> (VIIRS 2024)
  github_url: https://github.com/ExcuseMi/trmnl-nightsky-plugin
  category: nature
- keyname: location
  field_type: string
  name: Location
  description: City or address to centre the sky report on.<br /><strong>Examples:</strong> London, UK · Central Park, New York · Sydney, Australia
  placeholder: London, UK
- keyname: hide_info_panel
  field_type: boolean
  name: Hide Info Panel
  description: Show only the star chart, without the conditions overlay.
name: Night Sky
refresh_interval: 1440

---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 
serverless_language: 
polling_url: 'https://your-backend.example.com/data?location={{ custom_fields_values.location | url_encode }}&lat={{ custom_fields_values.lat | default: "" }}&lon={{ custom_fields_values.lon | default: "" }}&tz=###{{ trmnl.user.time_zone_iana }}'
polling_headers: ''
polling_body: ''
id: 290823
custom_fields:
- keyname: author_info
  name: About This Plugin
  field_type: author_bio
  description: Tonight's sky conditions for your location — Bortle scale, stars visible, moon phase, visible planets, and cloud cover.<br /><br /><strong>Data sources:</strong> <a href="https://aa.usno.navy.mil/data/api">USNO Astronomical API</a> · <a href="https://open-meteo.com">Open-Meteo</a> · <a href="https://www.lightpollutionmap.info">lightpollutionmap.info</a> (VIIRS 2024)
  github_url: https://github.com/ExcuseMi/trmnl-nightsky-plugin
  category: nature
- keyname: location
  field_type: string
  name: Location
  description: 'City or address to use for sky conditions.<br /><strong>Examples:</strong> London, UK · Central Park, New York · Sydney, Australia<br />Takes priority over Latitude / Longitude if both are set.'
  placeholder: London, UK
  group: Location
- keyname: lat
  field_type: string
  name: Latitude
  description: 'Decimal degrees latitude — only used when no Location is set.<br /><a href="https://www.latlong.net" target="_blank">Find your coordinates →</a>'
  placeholder: '51.5074'
  group: Location
  optional: true
- keyname: lon
  field_type: string
  name: Longitude
  description: 'Decimal degrees longitude — only used when no Location is set.'
  placeholder: "-0.1278"
  group: Location
  optional: true
name: Night Sky
refresh_interval: 60
